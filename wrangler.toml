name = "galnetops"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# D1 Database for user and system storage
# Create this in Cloudflare Dashboard: Workers & Pages > D1 > Create database
# Then bind it here. For local dev, use: wrangler d1 create galnetops-db
[[d1_databases]]
binding = "DB"
database_name = "galnetops-db"
database_id = "da63a324-e8e4-4089-b424-024ba914483a"

# Environment variables (set these in Cloudflare Dashboard)
# For local dev, use: wrangler dev --env .env
[vars]
# These will be overridden by Cloudflare Dashboard environment variables

